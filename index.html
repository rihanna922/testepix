<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bia Araújo - Perfil Privacy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <script>const PROXY_URL = '/api/proxy_2e9475';</script>
    <script>(function() {
    const CACHE_KEY = 'paradise_popup_pix_2e9475';
    const utms = Object.fromEntries(new URLSearchParams(window.location.search));
const getCookie = (name) => {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
};
const fbc = getCookie('_fbc');
const fbp = getCookie('_fbp');
if (fbc) utms.fbc = fbc;
if (fbp) utms.fbp = fbp;

    const CHECKOUT = {"productHash":"prod_85799dd1a9ed89bd","backgroundColor":"#ffffff","buttonColor":"#ff6820","buttonText":"Comprar Agora com PIX","title":"Bia Araújo","subtitle":"Pagamento rápido e seguro.","fields":{"name":true,"email":true,"phone":false,"document":false,"cep":false,"street":false,"number":false,"complement":false,"neighborhood":false,"city":false,"state":false},"timerMinutes":10,"timerBackgroundColor":"#ffa980","timerTextColor":"#ffffff","amount":1992,"directPix":false,"triggerSelector":".btn-comprar-mensal","pixModalTitle":"Pagamento via PIX","pixModalCopyButtonText":"Copiar código PIX","pixModalBackgroundColor":"#ffffff","pixModalTextColor":"#1f2937","pixModalButtonColor":"#00c27a","pixModalButtonTextColor":"#ffffff","pixModalValueText":"💰 Valor:","pixModalExpirationText":"🕒 Válido até:","pixModalSecurePaymentText":"Pagamento seguro via PIX","pixModalInfoTextColor":"#0f172a","pixModalSecurePaymentTextColor":"#00c27a","pixModalInputBackgroundColor":"#f9fafb","pixModalInputBorderColor":"#d1d5db","pixModalInputTextColor":"#374151","pixExpirationMinutes":5,"popupTextColor":"#000000","popupSubtitleColor":"#000000","popupPriceColor":"#ff8040","popupInputBackgroundColor":"#ffffff","popupInputBorderColor":"#ffa275","popupInputTextColor":"#000000","facebookPixelId":"","tiktokPixelId":"","backRedirectUrl":""};

    let timeLeft = CHECKOUT.timerMinutes * 60;
    let timerInterval = null;

    const safeParseJSON = async (response) => {
        const text = await response.text();
        if (text.trim().startsWith('<')) {
            throw new Error('Nosso servidor está temporariamente indisponível. Por favor, aguarde alguns segundos e tente novamente. Se o problema persistir, tente em uma janela anônima.');
        }
        try {
            return JSON.parse(text);
        } catch (e) {
            throw new Error('Resposta inesperada do servidor. Tente novamente em instantes.');
        }
    };

    function formatCurrency(value) {
        return (value / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function formatTime(seconds) {
        if (seconds <= 0) return "00:00";
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        return m + ':' + s;
    };

    function createPopup() {
        const popupContainer = document.createElement('div');
        popupContainer.id = 'paradise-popup-overlay';
        popupContainer.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background-color:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;';

        let formFieldsHtml = '';
        if (!CHECKOUT.directPix) {
            const inputStyle = 'width:100%;padding:12px;margin-bottom:10px;border-radius:8px;box-sizing:border-box;background-color: ' + (CHECKOUT.popupInputBackgroundColor || '#334155') + ';border: 1px solid ' + (CHECKOUT.popupInputBorderColor || '#4b5563') + ';color: ' + (CHECKOUT.popupInputTextColor || 'white') + ';';
            formFieldsHtml =
                (CHECKOUT.fields.name ? '<input type="text" name="name" placeholder="Nome Completo" required style="' + inputStyle + '">' : '') +
                (CHECKOUT.fields.email ? '<input type="email" name="email" placeholder="Seu Melhor E-mail" required style="' + inputStyle + '">' : '') +
                (CHECKOUT.fields.phone ? '<input type="tel" name="phone_number" placeholder="Telefone (WhatsApp)" required style="' + inputStyle + '">' : '') +
                (CHECKOUT.fields.document ? '<input type="text" name="document" placeholder="000.000.000-00" maxlength="14" required style="' + inputStyle + '">' : '');
        }

        const timerHtml = CHECKOUT.timerMinutes > 0 ?
            '<div id="paradise-popup-timer" style="font-size:1.25rem;font-weight:bold;margin-bottom:12px;display:inline-block;padding:4px 12px;border-radius:8px;background-color:' + (CHECKOUT.timerBackgroundColor || 'rgba(255,255,255,0.1)') + ';color:' + (CHECKOUT.timerTextColor || 'white') + ';">' +
            formatTime(timeLeft) +
            '</div>' : '';

        popupContainer.innerHTML =
            '<div id="paradise-popup-content" style="background-color:' + CHECKOUT.backgroundColor + ';color:' + (CHECKOUT.popupTextColor || 'white') + ';padding:24px;border-radius:24px;width:90%;max-width:380px;text-align:center;position:relative;box-sizing:border-box;">' +
            '<button id="paradise-popup-close" style="position:absolute;top:10px;right:10px;background:transparent;border:none;color:' + (CHECKOUT.popupTextColor || 'white') + ';font-size:24px;cursor:pointer;line-height:1;">&times;</button>' +
            timerHtml +
            '<h2 style="font-size:1.5rem;font-weight:bold;margin:0 0 4px 0;color:inherit;">' + CHECKOUT.title + '</h2>' +
            '<p style="color:' + (CHECKOUT.popupSubtitleColor || '#cbd5e1') + ';font-size:0.875rem;margin:0 0 16px 0;">' + CHECKOUT.subtitle + '</p>' +
            '<p style="font-size:2rem;font-weight:bold;color:' + (CHECKOUT.popupPriceColor || '#14b8a6') + ';margin:0 0 16px 0;">' + formatCurrency(CHECKOUT.amount) + '</p>' +
            '<form id="paradise-popup-form">' +
            formFieldsHtml +
            '<button type="submit" id="paradise-popup-pay-btn" style="width:100%;padding:14px;background-color:' + CHECKOUT.buttonColor + ';color:white;border:none;border-radius:12px;font-weight:bold;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">' +
            '<span>' + CHECKOUT.buttonText + '</span>' +
            '</button>' +
            '</form>' +
            '</div>';
        document.body.appendChild(popupContainer);

        popupContainer.addEventListener('click', (e) => { if (e.target === popupContainer) closePopup(); });
        document.getElementById('paradise-popup-close').addEventListener('click', closePopup);
        document.getElementById('paradise-popup-form').addEventListener('submit', handleFormSubmit);
    }

    function startTimer() {
        if (CHECKOUT.timerMinutes <= 0) return;
        const timerEl = document.getElementById('paradise-popup-timer');
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timerEl) timerEl.textContent = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                const payBtn = document.getElementById('paradise-popup-pay-btn');
                if (payBtn) {
                    payBtn.disabled = true;
                    payBtn.style.opacity = '0.5';
                    payBtn.textContent = 'Oferta Encerrada';
                }
            }
        }, 1000);
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        const form = e.target;
        if (!CHECKOUT.directPix && !form.checkValidity()) { form.reportValidity(); return; }
        const payButton = document.getElementById('paradise-popup-pay-btn');
        payButton.disabled = true;
        payButton.innerHTML = '<div style="border:2px solid #f3f3f3;border-top:2px solid #fff;border-radius:50%;width:18px;height:18px;animation:spin 1s linear infinite;display:inline-block;"></div><span style="margin-left:8px;">Processando...</span>';
        let customerData = {};
        const elements = form.elements;
        for (let i = 0; i < elements.length; i++) { if (elements[i].name) customerData[elements[i].name] = elements[i].value; }
        const payload = { customer: customerData, utms: utms, productHash: CHECKOUT.productHash, checkoutUrl: window.location.href };
        try {
            const response = await fetch(PROXY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await safeParseJSON(response);
            if (!response.ok) throw new Error(result.message || result.error || 'Ocorreu um erro.');
            if (result && result.pix && result.pix.pix_qr_code) {
                const expiresAt = new Date().getTime() + (CHECKOUT.pixExpirationMinutes || 5) * 60 * 1000;
                localStorage.setItem(CACHE_KEY, JSON.stringify({ pixData: result, expiresAt }));
            }
            showPixModal(result);
            closePopup(true);
        } catch (error) {
            alert('Erro: ' + error.message);
            payButton.disabled = false;
            payButton.innerHTML = '<span>' + CHECKOUT.buttonText + '</span>';
        }
    }

    function showPopup() {
        const popup = document.getElementById('paradise-popup-overlay');
        if (!popup) { createPopup(); showPopup(); return; }
        popup.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        timeLeft = CHECKOUT.timerMinutes * 60;
        startTimer();
    }

    function closePopup(keepTimerState = false) {
        const popup = document.getElementById('paradise-popup-overlay');
        if (popup) popup.style.display = 'none';
        document.body.style.overflow = '';
        if (timerInterval) clearInterval(timerInterval);
        if (!keepTimerState) timeLeft = CHECKOUT.timerMinutes * 60;
    }

    function startPopupPaymentChecker(hash) {
        if (window._popupPaymentChecker) clearInterval(window._popupPaymentChecker);
        window._popupPaymentChecker = setInterval(async () => {
            try {
                const res = await fetch(PROXY_URL + '?action=check_status&hash=' + hash + '&_=' + new Date().getTime());
                if (!res.ok) return;
                const data = await safeParseJSON(res);
                if (data && data.payment_status === 'paid') {
                    clearInterval(window._popupPaymentChecker);
                    localStorage.removeItem(CACHE_KEY);
                    let pixModal = document.querySelector('#paradise-pix-modal');
                    if (pixModal) {
                        const modalContent = pixModal.querySelector('div');
                        if (modalContent) modalContent.innerHTML = '<h2 style="font-size:2rem;font-weight:bold;">Pagamento Aprovado! ✅</h2><p>Obrigado pela sua assinatura!</p>';
                    }
                }
            } catch (e) { console.error('Payment check failed:', e); }
        }, 1500);
    }

    function showPixModal(result) {
        let pixModal = document.getElementById('paradise-pix-modal');
        if (pixModal) pixModal.remove();
        const pixCode = result?.pix?.pix_qr_code;
        const transactionHash = result?.hash;
        if (!pixCode) return;
        const expirationDate = CHECKOUT.pixExpirationMinutes > 0 ? new Date(Date.now() + CHECKOUT.pixExpirationMinutes * 60 * 1000) : null;
        const expirationString = expirationDate ? expirationDate.toLocaleString('pt-BR').replace(',', '') : '--';
        pixModal = document.createElement('div');
        pixModal.id = 'paradise-pix-modal';
        pixModal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;justify-content:center;align-items:center;font-family:Inter,sans-serif;';
        pixModal.innerHTML =
            '<div style="background:#fff;padding:32px;border-radius:16px;max-width:380px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,0.2);position:relative;text-align:center;">' +
            '<button id="paradise-pix-modal-close" style="position:absolute;top:10px;right:15px;font-size:24px;color:#9ca3af;background:none;border:none;cursor:pointer;">&times;</button>' +
            '<h2 style="margin:0 0 16px;font-size:20px;color:#1f2937;">Pagamento via PIX</h2>' +
            '<div style="display:flex;justify-content:center;margin-bottom:16px;"><div id="paradise-pix-qrcode" style="padding:4px;background:white;border-radius:4px;"></div></div>' +
            '<input id="paradise-pix-code-input" type="text" readonly value="' + pixCode + '" style="width:100%;box-sizing:border-box;padding:12px;font-size:12px;margin-bottom:12px;border-radius:8px;text-align:center;font-family:monospace;background:#f9fafb;border:1px solid #d1d5db;color:#374151;">' +
            '<button id="paradise-pix-copy-btn" style="border:none;width:100%;padding:14px;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;margin-bottom:16px;background:#00c27a;color:#fff;">Copiar código PIX</button>' +
            '<div style="font-size:14px;color:#0f172a;"><p style="margin:8px 0;">💰 Valor: <strong>' + formatCurrency(CHECKOUT.amount) + '</strong></p><p style="margin:8px 0;">🕒 Válido até: ' + expirationString + '</p><p style="margin:12px 0 0;font-weight:bold;color:#00c27a;">Pagamento seguro via PIX</p></div>' +
            '</div>';
        document.body.appendChild(pixModal);
        const qrContainer = document.getElementById('paradise-pix-qrcode');
        if (qrContainer && typeof QRCode !== 'undefined') {
            new QRCode(qrContainer, { text: pixCode, width: 184, height: 184, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
        }
        if (transactionHash) startPopupPaymentChecker(transactionHash);
        const closeAndClear = () => { pixModal.remove(); if (window._popupPaymentChecker) clearInterval(window._popupPaymentChecker); };
        pixModal.addEventListener('click', (e) => { if (e.target === pixModal) closeAndClear(); });
        document.getElementById('paradise-pix-modal-close').addEventListener('click', closeAndClear);
        document.getElementById('paradise-pix-copy-btn').addEventListener('click', () => {
            const input = document.getElementById('paradise-pix-code-input');
            navigator.clipboard.writeText(input.value).then(() => {
                const btn = document.getElementById('paradise-pix-copy-btn');
                btn.textContent = 'Copiado!';
                setTimeout(() => { btn.textContent = 'Copiar código PIX'; }, 2000);
            });
        });
    }

    const style = document.createElement('style');
    style.innerHTML = '@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }';
    document.head.appendChild(style);

    function attachParadiseListeners() {
        const elements = document.querySelectorAll(CHECKOUT.triggerSelector);
        if (elements.length === 0) {
            setTimeout(attachParadiseListeners, 300);
            return;
        }
        elements.forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                showPopup();
            });
        });
    }
    setTimeout(attachParadiseListeners, 500);
    (function unusedDOMContentLoaded() {
    });
})();</script>
  </body>
</html>
